[changelog]
header = """# Changelog\n\n> Older releases: see [git tags](https://github.com/waterworkshq/orcy/tags) and [GitHub Releases](https://github.com/waterworkshq/orcy/releases).\n"""
body = """
{% if version %}## {{ version | trim_start_matches(pat="v") }}{% if timestamp %} — {{ timestamp | date(format="%Y-%m-%d") }}{% endif %}{% else %}## Unreleased{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
#### {{ commit.message | trim }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/waterworkshq/orcy/commit/{{ commit.id }}))
{% if commit.body %}
{% for line in commit.body | split(pat="\\n") %}{% set trimmed = line | trim | trim_start_matches(pat="- ") | trim %}{% if trimmed != "" %}{{ loop.index }}. {{ trimmed }}{% endif %}
{% endfor %}{% endif %}
{% endfor %}
{% endfor %}
"""
trim = false

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^refactor", group = "Refactors" },
  { message = "^perf", group = "Performance" },
  { message = "^chore\\(release\\)", group = "Release", skip = true },
  { message = "^chore", group = "Chores" },
  { message = "^docs", group = "Documentation" },
  { message = "^style", group = "Style" },
  { message = "^test", group = "Tests" },
]
